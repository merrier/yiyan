name: Update Hitokoto Bundle Data

on:
  schedule:
    # 每天北京时间凌晨0点 (UTC时间前一天16点)
    - cron: '0 16 * * *'
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Update Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/update_hitokoto_bundle.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 添加 data 目录下所有 json 文件和版本文件
          git add data/*.json data/hitokoto_version.txt
          
          # 检查是否有文件发生变动
          if ! git diff --cached --quiet; then
            git commit -m "chore(data): auto-update hitokoto bundle to v${NEW_VERSION}"
            git push
            echo "Data updated successfully to v${NEW_VERSION}."
          else
            echo "No updates available or no changes detected."
          fi
